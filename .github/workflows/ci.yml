name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Verify goimports
        run: |
          goimports_bin="$(go env GOPATH)/bin/goimports"
          unformatted="$("$goimports_bin" -l .)"
          if [ -n "$unformatted" ]; then
            echo "Files need goimports:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Run deadcode
        run: go run golang.org/x/tools/cmd/deadcode@latest -test ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: |
          mkdir -p bin
          go build -o bin/getklogs .

      - name: Verify README usage block
        run: |
          bash scripts/update-readme.sh
          git diff --exit-code -- README.md

  tag:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next patch tag
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          git fetch --tags --force

          if git tag --points-at "$GITHUB_SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Commit already has a version tag."
            exit 0
          fi

          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            IFS='.' read -r major minor patch <<<"${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$next" "$GITHUB_SHA"
          git push origin "$next"
